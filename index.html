    // 設定
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyC0iW4RGkmYZ6N7tCGXmn2ghtUW-xHIpDo",
      authDomain: "cloud-station1049.firebaseapp.com",
      projectId: "cloud-station1049",
      storageBucket: "cloud-station1049.firebasestorage.app",
      messagingSenderId: "951921454526",
      appId: "1:951921454526:web:bd36c573b2d8008a249def",
      measurementId: "G-NK1BH82EVM"
    }; 
    const appId = 'cloud-station-app';
    let app, auth, db, analytics;
    if (FIREBASE_CONFIG) {
      try {
        app = initializeApp(FIREBASE_CONFIG);
        auth = getAuth(app);
        db = getFirestore(app);
        analytics = getAnalytics(app);
      } catch (e) { console.error("Firebase init error:", e); }
    }

    // Googleログインを許可するメールドメイン。
    // Google Sites側で組織限定にしている場合は空配列のままでも運用できます。
    // より厳密にする場合は、例: ['example.co.jp'] のように設定してください。
    const ALLOWED_EMAIL_DOMAINS = [];

    const isAllowedEmail = (email) => {
      if (!ALLOWED_EMAIL_DOMAINS.length) return true;
      if (!email || !email.includes('@')) return false;
      const domain = email.split('@').pop().toLowerCase();
      return ALLOWED_EMAIL_DOMAINS.map(d => d.toLowerCase()).includes(domain);
    };

    const createSessionId = () => {
      try {
        const key = 'cloud_station_session_id';
        const existing = window.sessionStorage.getItem(key);
        if (existing) return existing;
        const newId = `session_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        window.sessionStorage.setItem(key, newId);
        return newId;
      } catch (e) {
        return `session_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
      }
    };

    const parseCSV = (text) => {
      const lines = []; let currentLine = []; let currentField = ''; let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i]; const nextChar = text[i + 1];
        if (inQuotes) {
          if (char === '"' && nextChar === '"') { currentField += '"'; i++; }
          else if (char === '"') inQuotes = false;
          else currentField += char;
        } else {
          if (char === '"') inQuotes = true;
          else if (char === ',') { currentLine.push(currentField); currentField = ''; }
          else if (char === '\n' || (char === '\r' && nextChar === '\n')) { currentLine.push(currentField); lines.push(currentLine); currentLine = []; currentField = ''; if (char === '\r') i++; }
          else currentField += char;
        }
      }
      if (currentField !== '' || currentLine.length > 0) { currentLine.push(currentField); lines.push(currentLine); }
      return lines;
    };

    const csvToObjects = (csvText) => {
      const lines = parseCSV(csvText); if (lines.length < 2) return { headers: [], data: [] };
      const headers = lines[0].map(h => h.trim().replace(/\r?\n/g, ''));
      
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        const currentLine = lines[i]; 
        
        // 全列が空（または空白のみ）の行はスキップ
        if (currentLine.every(cell => !cell || cell.trim() === '')) continue;
        
        const obj = {}; for (let j = 0; j < headers.length; j++) obj[headers[j]] = currentLine[j] || '';
        data.push(obj);
      }
      return { headers, data };
    };

    // Google Drive URLからファイルIDを抽出してサムネイルURLを生成
    const getDriveThumbnailUrl = (url) => {
      if (!url) return null;
      // https://drive.google.com/file/d/XXXX/view や https://drive.google.com/open?id=XXXX のパターンに対応
      const match = url.match(/\/d\/(.*?)\//) || url.match(/id=(.*?)(&|$)/);
      if (match && match[1]) {
        return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
      }
      return null;
    };

    const TARGET_COLUMNS_CLOUD = ['資料名（YYYYMMDD_資料名）', '営業カテゴリ', 'ファイル形式', 'カテゴリ', '検索キーワード登録 ※複数登録可/半角スペース区切り', '資料内容の説明'];
    const DISPLAY_COLUMNS_CLOUD = ['更新日', '新規登録日', '資料名（YYYYMMDD_資料名）', '利用頻度/重要度', '営業カテゴリ', 'ファイル形式', 'カテゴリ', '検索キーワード登録 ※複数登録可/半角スペース区切り', '資料内容の説明', 'クライアント共有ルール', '登録管理者', 'チーム', '資料を使ってみた改善案（投稿は「O6」セル）'];

    // バッジ色の記憶用変数（グループごとに独立して色を割り当て）
    const badgeColorMaps = {};
    const badgeColorIndices = {};
    const badgeColorsPalette = ['bg-blue-100/80 text-blue-800 border-blue-200 backdrop-blur-sm', 'bg-emerald-100/80 text-emerald-800 border-emerald-200 backdrop-blur-sm', 'bg-violet-100/80 text-violet-800 border-violet-200 backdrop-blur-sm', 'bg-amber-100/80 text-amber-800 border-amber-200 backdrop-blur-sm', 'bg-rose-100/80 text-rose-800 border-rose-200 backdrop-blur-sm', 'bg-cyan-100/80 text-cyan-800 border-cyan-200 backdrop-blur-sm', 'bg-fuchsia-100/80 text-fuchsia-800 border-fuchsia-200 backdrop-blur-sm', 'bg-indigo-100/80 text-indigo-800 border-indigo-200 backdrop-blur-sm', 'bg-teal-100/80 text-teal-800 border-teal-200 backdrop-blur-sm', 'bg-pink-100/80 text-pink-800 border-pink-200 backdrop-blur-sm'];

    const getBadgeColor = (text, groupId = 'default') => {
      if (!text) return 'bg-lime-100/80 text-lime-800 border-lime-200 backdrop-blur-sm';
      
      if (!badgeColorMaps[groupId]) {
        badgeColorMaps[groupId] = new Map();
        badgeColorIndices[groupId] = 0;
      }
      
      const map = badgeColorMaps[groupId];
      
      // 一度登場した文字列の色は記憶して同じ色を返す
      if (map.has(text)) {
        return map.get(text);
      }
      
      // 新しい文字列の場合はパレットから順番に色を選んで記憶する
      const color = badgeColorsPalette[badgeColorIndices[groupId] % badgeColorsPalette.length];
      map.set(text, color);
      badgeColorIndices[groupId]++;
      
      return color;
    };

    const getFileBadgeColor = (type) => {
      if (!type) return 'bg-yellow-100/80 text-yellow-800 border-yellow-200 backdrop-blur-sm';
      const lowerType = type.toLowerCase();
      if (lowerType.includes('pdf')) return 'bg-red-100/90 text-red-800 border-red-200 backdrop-blur-sm';
      if (lowerType.includes('xls') || lowerType.includes('excel') || lowerType.includes('スプレッド') || lowerType.includes('csv')) return 'bg-green-100/90 text-green-800 border-green-200 backdrop-blur-sm';
      if (lowerType.includes('ppt') || lowerType.includes('powerpoint') || lowerType.includes('スライド')) return 'bg-orange-100/90 text-orange-800 border-orange-200 backdrop-blur-sm';
      if (lowerType.includes('doc') || lowerType.includes('word')) return 'bg-blue-100/90 text-blue-800 border-blue-200 backdrop-blur-sm';
      if (lowerType.includes('mp4') || lowerType.includes('動画') || lowerType.includes('フォーム') || lowerType.includes('form')) return 'bg-purple-100/90 text-purple-800 border-purple-200 backdrop-blur-sm';
      if (lowerType.includes('png') || lowerType.includes('jpg') || lowerType.includes('画像')) return 'bg-teal-100/90 text-teal-800 border-teal-200 backdrop-blur-sm';
      return 'bg-yellow-100/80 text-yellow-800 border-yellow-200 backdrop-blur-sm';
    };

    const getColumnWidthClass = (colName) => {
      if (colName === '資料名（YYYYMMDD_資料名）') return "min-w-[350px] max-w-[600px]";
      if (colName === '検索キーワード登録 ※複数登録可/半角スペース区切り') return "min-w-[200px] max-w-[400px]";
      if (colName === '資料を使ってみた改善案（投稿は「O6」セル）') return "min-w-[400px] max-w-[800px]";
      if (colName === '資料内容の説明') return "min-w-[250px] max-w-[500px]";
      if (colName === '更新日' || colName === '新規登録日') return "min-w-[110px] max-w-[140px]";
      if (colName === '利用頻度/重要度') return "min-w-[140px] max-w-[180px]";
      if (colName === 'ファイル形式') return "min-w-[200px] max-w-[300px]";
      if (colName === 'クライアント共有ルール') return "min-w-[200px] max-w-[400px]";
      if (colName === '営業カテゴリ' || colName === 'カテゴリ') return "min-w-[200px] max-w-[300px]";
      return "min-w-[140px] max-w-[250px]";
    };

    // ハイライト用汎用コンポーネント
    const HighlightText = ({ text, query }) => {
      const displayValue = useMemo(() => {
        if (!text) return null;
        if (!query || typeof query !== 'string' || !query.trim()) return text;
        const terms = query.trim().replace(/　/g, ' ').split(/\s+/).filter(t => !t.startsWith('-') && t.length > 0);
        if (terms.length === 0) return text;
        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${terms.map(escapeRegExp).join('|')})`, 'gi');
        const parts = String(text).split(regex);
        return parts.map((part, i) => {
          if (terms.some(t => t.toLowerCase() === part.toLowerCase())) {
            return <mark key={i} className="bg-yellow-200/90 text-yellow-900 font-bold rounded-[2px] px-0.5 shadow-sm">{part}</mark>;
          }
          return <span key={i}>{part}</span>;
        });
      }, [text, query]);
      return <>{displayValue}</>;
    };

    const EditableCell = ({ initialValue, documentName, onSave, isEditing, onEditStart, onCancel, placeholderText = "クリックして編集", placeholderColorClass = "text-blue-500", highlightQuery = "" }) => {
      const [value, setValue] = useState(initialValue);
      useEffect(() => { setValue(initialValue); }, [initialValue]);
      useEffect(() => { if (!isEditing) setValue(initialValue); }, [isEditing, initialValue]);
      const handleSave = (e) => { e.preventDefault(); e.stopPropagation(); onSave(documentName, value); onCancel(); };
      const handleCancel = (e) => { e.preventDefault(); e.stopPropagation(); onCancel(); };

      return (
        <div className="relative w-full h-full flex items-center">
          <div onClick={(e) => { e.preventDefault(); e.stopPropagation(); if (!isEditing) onEditStart(); }} className={`group/cell cursor-pointer w-full h-full min-h-[48px] max-h-32 overflow-y-auto mini-scrollbar px-3 py-2 flex items-start rounded-lg hover:bg-white/40 border border-transparent hover:border-white/60 transition-all duration-300 ${isEditing ? 'opacity-0' : 'opacity-100'}`}>
            <div className="whitespace-pre-wrap break-words text-xs text-slate-700 leading-relaxed w-full">
              {initialValue ? <HighlightText text={initialValue} query={highlightQuery} /> : <span className={`flex items-center italic text-[11px] font-medium ${placeholderColorClass}`}><Sparkles className="w-3 h-3 mr-1" />{placeholderText}</span>}
            </div>
            <div className="absolute right-1 top-1/2 -translate-y-1/2 opacity-0 group-hover/cell:opacity-100 transition-all bg-white p-1 rounded-md text-blue-600 shadow-sm border border-slate-200"><Edit2 className="w-3 h-3" /></div>
          </div>
          {isEditing && (
            <div className="absolute z-[100] left-0 top-0 bg-white/95 backdrop-blur-3xl p-3.5 border border-indigo-200 rounded-xl shadow-2xl flex flex-col gap-2 min-w-[380px] w-full" onClick={(e) => e.stopPropagation()}>
              <textarea className="w-full h-32 border border-slate-200 bg-white/80 backdrop-blur-sm rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400/50 resize-none custom-scrollbar shadow-inner leading-relaxed" value={value} onChange={(e) => setValue(e.target.value)} placeholder={placeholderText} autoFocus />
              <div className="flex justify-end gap-2 mt-1">
                <button type="button" onClick={handleCancel} className="flex items-center px-3 py-1.5 text-xs font-semibold text-slate-600 bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-lg transition-colors shadow-sm cursor-pointer"><X className="w-4 h-4 mr-1 pointer-events-none" />キャンセル</button>
                <button type="button" onClick={handleSave} className="flex items-center px-4 py-1.5 text-xs font-semibold text-white bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 rounded-lg transition-all shadow-md hover:shadow-lg cursor-pointer border-transparent"><Check className="w-4 h-4 mr-1 pointer-events-none" />保存</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      // タブ別CSVデータ
      const [cloudStationData, setCloudStationData] = useState([]);
      const [newsLatestData, setNewsLatestData] = useState([]);
      const [newsArchiveData, setNewsArchiveData] = useState([]);
      const [seminarData, setSeminarData] = useState([]);
      const [dataStatus, setDataStatus] = useState({ cloud_station: 'idle', news: 'idle', news_archive: 'idle', seminar: 'idle' });
      const [dataErrors, setDataErrors] = useState({ cloud_station: null, news: null, news_archive: null, seminar: null });
      const dataStatusRef = useRef({ cloud_station: 'idle', news: 'idle', news_archive: 'idle', seminar: 'idle' });
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [authError, setAuthError] = useState(null);
      const accessLoggedRef = useRef(false);
      const sessionIdRef = useRef(createSessionId());
      
      // UIステート
      const [activeTab, setActiveTab] = useState('cloud_station'); // 'cloud_station', 'news', 'seminar', 'qa'
      const [toastMessage, setToastMessage] = useState(null);
      const [isScrolled, setIsScrolled] = useState(false); // 全体設定（スクロールで自動コンパクト）

      useEffect(() => {
        setIsScrolled(false);
      }, [activeTab]);

      // --- スライドインジケーター用 ---
      const tabsRef = useRef({});
      const containerRef = useRef(null);
      const [indicatorStyle, setIndicatorStyle] = useState({ left: 0, width: 0, opacity: 0 });

      useEffect(() => {
        const updateIndicator = () => {
          requestAnimationFrame(() => {
            const currentSpan = tabsRef.current[activeTab];
            const container = containerRef.current;
            if (currentSpan && container) {
              const spanRect = currentSpan.getBoundingClientRect();
              const containerRect = container.getBoundingClientRect();
              const left = spanRect.left - containerRect.left + container.scrollLeft;
              setIndicatorStyle({ left: left - 4, width: spanRect.width + 8, opacity: 1 });
            }
          });
        };

        updateIndicator();
        // 初期レンダリング時にフォントロード等で幅が変わるケースに対応
        const timer = setTimeout(updateIndicator, 150);
        window.addEventListener('resize', updateIndicator);
        return () => {
          window.removeEventListener('resize', updateIndicator);
          clearTimeout(timer);
        };
      }, [activeTab, cloudStationData.length, newsLatestData.length, newsArchiveData.length, seminarData.length]);

      const getIndicatorColor = (tab) => {
        switch(tab) {
          case 'cloud_station': return 'from-blue-400/60 to-cyan-400/60 shadow-[0_2px_4px_rgba(59,130,246,0.5)]';
          case 'news': return 'from-orange-400/60 to-amber-400/60 shadow-[0_2px_4px_rgba(249,115,22,0.5)]';
          case 'seminar': return 'from-[#3d98b3]/60 to-[#c49bc6]/60 shadow-[0_2px_4px_rgba(61,152,179,0.5)]';
          case 'qa': return 'from-violet-400/60 to-fuchsia-400/60 shadow-[0_2px_4px_rgba(139,92,246,0.5)]';
          default: return 'from-blue-400/60 to-cyan-400/60 shadow-[0_2px_4px_rgba(59,130,246,0.5)]';
        }
      };
      
      // クラウドステーション用ステート
      const [searchQueryCloud, setSearchQueryCloud] = useState('');
      const [feedbacks, setFeedbacks] = useState({});
      const [selectedDescription, setSelectedDescription] = useState(null);
      const [editingCellId, setEditingCellId] = useState(null);
      const [sortConfigCloud, setSortConfigCloud] = useState({ key: '新規登録日', direction: 'desc' });
      const [filtersCloud, setFiltersCloud] = useState({ 'ファイル形式': [], 'カテゴリ': [], '営業カテゴリ': [] });
      const [openFilter, setOpenFilter] = useState(null); // ドロップダウン開閉用(タブ間で共有)
      const [isHeaderBlinking, setIsHeaderBlinking] = useState(false);

      // 新着ニュース用ステート
      const [searchQueryNews, setSearchQueryNews] = useState('');
      const [filtersNews, setFiltersNews] = useState({ 'ソース': [] });
      const [showNewsHelp, setShowNewsHelp] = useState(false);

      // セミナー用ステート
      const [searchQuerySeminar, setSearchQuerySeminar] = useState('');
      const [filtersSeminar, setFiltersSeminar] = useState({ 'カテゴリー': [] });
      const [seminarViewMode, setSeminarViewMode] = useState('list'); // 'list' or 'card'
      const [showComingSoon, setShowComingSoon] = useState(false); // 準備中表示用ステート

      // Q&A用ステート
      const [qaItems, setQaItems] = useState([]);
      const [searchQueryQa, setSearchQueryQa] = useState('');

      // Q&A削除確認用ステート
      const [deleteConfirmId, setDeleteConfirmId] = useState(null);
      const [deletePassword, setDeletePassword] = useState('');
      const [deleteError, setDeleteError] = useState(false);

      // ニュース追加用ステート
      const [showAddNewsModal, setShowAddNewsModal] = useState(false);
      const [newsFormData, setNewsFormData] = useState({ url: '', date: '', title: '', body: '' });
      const [isSubmittingNews, setIsSubmittingNews] = useState(false);

      // --- スクロール位置保持用 ---
      const scrollPositions = useRef({ cloud_station: 0, news: 0, seminar: 0, qa: 0 });
      const scrollContainerRef = useRef(null);
      const [isMobileView, setIsMobileView] = useState(false);

      // --- 仮想スクロール（新着ニュース用） ---
      const NEWS_ITEM_HEIGHT = 90; // 推定される1行の高さ(px)
      const NEWS_OVERSCAN = 10; // 画面外に描画しておく余裕分の行数
      const [newsScrollTop, setNewsScrollTop] = useState(0);
      const [newsContainerHeight, setNewsContainerHeight] = useState(800);
      const [mobileNewsVisibleCount, setMobileNewsVisibleCount] = useState(30);
      const [mobileCloudVisibleCount, setMobileCloudVisibleCount] = useState(30);
      const [seminarCardVisibleCount, setSeminarCardVisibleCount] = useState(30);

      const CSV_URLS = {
        cloud_station: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx6XLwNTA6ypqtoG-Sh3ZMycBE4-itlVhwV-TUpZmab1TtnNXfM3aTmVQNK_7WlmAk9twOIQ91_NYc/pub?gid=1956093007&single=true&output=csv',
        news: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx6XLwNTA6ypqtoG-Sh3ZMycBE4-itlVhwV-TUpZmab1TtnNXfM3aTmVQNK_7WlmAk9twOIQ91_NYc/pub?gid=446921452&single=true&output=csv',
        news_archive: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx6XLwNTA6ypqtoG-Sh3ZMycBE4-itlVhwV-TUpZmab1TtnNXfM3aTmVQNK_7WlmAk9twOIQ91_NYc/pub?gid=708363927&single=true&output=csv',
        seminar: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx6XLwNTA6ypqtoG-Sh3ZMycBE4-itlVhwV-TUpZmab1TtnNXfM3aTmVQNK_7WlmAk9twOIQ91_NYc/pub?gid=822417793&single=true&output=csv'
      };

      const TAB_LABELS = { cloud_station: '資料', news: 'ニュース', news_archive: '過去ニュース', seminar: 'セミナー' };

      const setTabStatus = (tab, status) => {
        dataStatusRef.current[tab] = status;
        setDataStatus(prev => ({ ...prev, [tab]: status }));
      };

      const setTabError = (tab, message) => {
        setDataErrors(prev => ({ ...prev, [tab]: message }));
      };

      const setTabData = (tab, data) => {
        if (tab === 'cloud_station') setCloudStationData(data.filter(row => row['資料名（YYYYMMDD_資料名）']?.trim()));
        if (tab === 'news') setNewsLatestData(data.filter(row => row['タイトル']?.trim()));
        if (tab === 'news_archive') setNewsArchiveData(data.filter(row => row['タイトル']?.trim()));
        if (tab === 'seminar') setSeminarData(data.filter(row => row['開催日']?.trim() && row['セミナー資料']?.trim()));
      };

      const loadTabData = async (tab) => {
        if (!CSV_URLS[tab]) return;
        const currentStatus = dataStatusRef.current[tab];
        if (currentStatus === 'loading' || currentStatus === 'loaded') return;

        setTabStatus(tab, 'loading');
        setTabError(tab, null);

        try {
          const response = await fetch(CSV_URLS[tab], { cache: 'no-store' });
          if (!response.ok) throw new Error(`${TAB_LABELS[tab] || 'データ'}の取得に失敗しました。`);
          const csvText = await response.text();
          const parsed = csvToObjects(csvText);
          setTabData(tab, parsed.data);
          setTabStatus(tab, 'loaded');
        } catch (err) {
          console.error(`${tab} fetch error:`, err);
          setTabStatus(tab, 'error');
          setTabError(tab, `${TAB_LABELS[tab] || 'データ'}の読み込みに失敗しました。`);
        }
      };

      const scheduleIdleWork = (callback, delay = 800) => {
        if (window.requestIdleCallback) {
          return window.requestIdleCallback(callback, { timeout: delay + 2500 });
        }
        return window.setTimeout(callback, delay);
      };

      // 初回は資料CSVだけを優先取得し、表示後にニュース→セミナーをバックグラウンド先読みする
      useEffect(() => {
        let cancelled = false;

        loadTabData('cloud_station').then(() => {
          if (cancelled) return;
          scheduleIdleWork(() => {
            if (cancelled) return;
            loadTabData('news').then(() => {
              if (cancelled) return;
              scheduleIdleWork(() => {
                if (!cancelled) loadTabData('seminar');
              }, 800);
            });
          }, 900);
        });

        return () => { cancelled = true; };
      }, []);

      // タブを開いた時点で未読込なら、そのタブを優先取得する
      useEffect(() => {
        if (activeTab !== 'qa') {
          loadTabData(activeTab);
        }
      }, [activeTab]);

      const activeTabLoading = activeTab !== 'qa' && (dataStatus[activeTab] === 'idle' || dataStatus[activeTab] === 'loading');
      const activeTabError = activeTab !== 'qa' ? dataErrors[activeTab] : null;
      const activeTabLabel = TAB_LABELS[activeTab] || 'データ';

      const newsData = useMemo(() => [...newsLatestData, ...newsArchiveData], [newsLatestData, newsArchiveData]);
      const newsArchiveLoaded = dataStatus.news_archive === 'loaded';
      const newsArchiveLoading = dataStatus.news_archive === 'loading';
      const newsArchiveError = dataErrors.news_archive;

      // --- クラウドステーション用 ロジック ---
      const fileFormatOptions = useMemo(() => {
        const options = new Set(); cloudStationData.forEach(row => { if (row['ファイル形式']) options.add(row['ファイル形式'].trim()); });
        return Array.from(options).sort();
      }, [cloudStationData]);

      const categoryOptions = useMemo(() => {
        const options = new Set(); cloudStationData.forEach(row => {
          if (row['カテゴリ']) { row['カテゴリ'].split(',').map(s => s.trim()).filter(Boolean).forEach(cat => options.add(cat)); }
        });
        return Array.from(options).sort();
      }, [cloudStationData]);

      const salesCategoryOptions = useMemo(() => {
        const options = new Set(); cloudStationData.forEach(row => {
          if (row['営業カテゴリ']) { row['営業カテゴリ'].split(',').map(s => s.trim()).filter(Boolean).forEach(cat => options.add(cat)); }
        }); return Array.from(options).sort();
      }, [cloudStationData]);

      const filteredCloudData = useMemo(() => {
        let result = [...cloudStationData];
        if (searchQueryCloud.trim()) {
          const terms = searchQueryCloud.trim().replace(/　/g, ' ').split(/\s+/);
          const req = terms.filter(t => !t.startsWith('-')).map(t => t.toLowerCase());
          const exc = terms.filter(t => t.startsWith('-') && t.length > 1).map(t => t.substring(1).toLowerCase());
          result = result.filter(row => {
            const txt = TARGET_COLUMNS_CLOUD.map(col => row[col] || '').join(' ').toLowerCase();
            return (req.length === 0 || req.every(t => txt.includes(t))) && (exc.length === 0 || exc.every(t => !txt.includes(t)));
          });
        }
        if (filtersCloud['ファイル形式'] && filtersCloud['ファイル形式'].length > 0) {
          result = result.filter(row => filtersCloud['ファイル形式'].some(f => (row['ファイル形式'] || '').includes(f)));
        }
        if (filtersCloud['カテゴリ'] && filtersCloud['カテゴリ'].length > 0) {
          result = result.filter(row => {
            if (!row['カテゴリ']) return false;
            const cats = row['カテゴリ'].split(',').map(c => c.trim());
            return filtersCloud['カテゴリ'].some(f => cats.includes(f));
          });
        }
        if (filtersCloud['営業カテゴリ'] && filtersCloud['営業カテゴリ'].length > 0) {
          result = result.filter(row => {
            if (!row['営業カテゴリ']) return false;
            const cats = row['営業カテゴリ'].split(',').map(c => c.trim());
            return filtersCloud['営業カテゴリ'].some(f => cats.includes(f));
          });
        }
        if (sortConfigCloud.key) {
          result.sort((a, b) => {
            const vA = a[sortConfigCloud.key] || ''; const vB = b[sortConfigCloud.key] || '';
            if (sortConfigCloud.key === '更新日' || sortConfigCloud.key === '新規登録日') {
              const timeA = vA ? new Date(vA).getTime() : 0;
              const timeB = vB ? new Date(vB).getTime() : 0;
              return sortConfigCloud.direction === 'desc' ? timeB - timeA : timeA - timeB;
            } else if (sortConfigCloud.key === '利用頻度/重要度') {
              const cA = (vA.match(/★/g) || []).length; const cB = (vB.match(/★/g) || []).length;
              return sortConfigCloud.direction === 'desc' ? cB - cA : cA - cB;
            } return 0;
          });
        } return result;
      }, [cloudStationData, searchQueryCloud, filtersCloud, sortConfigCloud]);

      const setCloudMobileFilter = (colName, value) => {
        setFiltersCloud(prev => ({ ...prev, [colName]: value ? [value] : [] }));
      };

      const hasActiveCloudFilters = Object.values(filtersCloud).some(values => values && values.length > 0);

      // --- 新着ニュース用 ロジック ---
      const newsSourceOptions = useMemo(() => {
        const options = new Set(); newsData.forEach(row => { if (row['サイト名']) options.add(row['サイト名']); });
        return Array.from(options).sort();
      }, [newsData]);

      const filteredNewsData = useMemo(() => {
        let result = [...newsData];
        if (searchQueryNews.trim()) {
          const terms = searchQueryNews.trim().replace(/　/g, ' ').split(/\s+/);
          const req = terms.filter(t => !t.startsWith('-')).map(t => t.toLowerCase());
          const exc = terms.filter(t => t.startsWith('-') && t.length > 1).map(t => t.substring(1).toLowerCase());
          result = result.filter(row => {
            const txt = [row['タイトル'], row['本文/要約']].join(' ').toLowerCase();
            return (req.length === 0 || req.every(t => txt.includes(t))) && (exc.length === 0 || exc.every(t => !txt.includes(t)));
          });
        }
        if (filtersNews['ソース'] && filtersNews['ソース'].length > 0) {
          result = result.filter(row => filtersNews['ソース'].some(f => (row['サイト名'] || '').includes(f)));
        }
        // 新着順（日付降順）固定
        result.sort((a, b) => {
          const timeA = a['日付'] ? new Date(a['日付']).getTime() : 0;
          const timeB = b['日付'] ? new Date(b['日付']).getTime() : 0;
          return timeB - timeA;
        });
        return result;
      }, [newsData, searchQueryNews, filtersNews]);

      const setNewsMobileFilter = (value) => {
        setFiltersNews(prev => ({ ...prev, 'ソース': value ? [value] : [] }));
      };

      const hasActiveNewsFilters = filtersNews['ソース'] && filtersNews['ソース'].length > 0;

      // --- 仮想スクロール計算（新着ニュース用） ---
      const safeNewsScrollTop = Math.max(0, Math.min(newsScrollTop, filteredNewsData.length * NEWS_ITEM_HEIGHT));
      const newsStartIndex = Math.max(0, Math.floor(safeNewsScrollTop / NEWS_ITEM_HEIGHT) - NEWS_OVERSCAN);
      const newsEndIndex = Math.min(filteredNewsData.length, Math.floor((safeNewsScrollTop + newsContainerHeight) / NEWS_ITEM_HEIGHT) + NEWS_OVERSCAN);
      
      const visibleNewsData = filteredNewsData.slice(newsStartIndex, newsEndIndex);
      const newsPaddingTop = newsStartIndex * NEWS_ITEM_HEIGHT;
      const newsPaddingBottom = Math.max(0, (filteredNewsData.length - newsEndIndex) * NEWS_ITEM_HEIGHT);

      // --- セミナー用 ロジック ---
      const seminarCategoryOptions = useMemo(() => {
        const options = new Set(); seminarData.forEach(row => { if (row['カテゴリー']) options.add(row['カテゴリー']); });
        return Array.from(options).sort();
      }, [seminarData]);

      const filteredSeminarData = useMemo(() => {
        let result = [...seminarData];
        if (searchQuerySeminar.trim()) {
          const terms = searchQuerySeminar.trim().replace(/　/g, ' ').split(/\s+/);
          const req = terms.filter(t => !t.startsWith('-')).map(t => t.toLowerCase());
          const exc = terms.filter(t => t.startsWith('-') && t.length > 1).map(t => t.substring(1).toLowerCase());
          result = result.filter(row => {
            const txt = [row['セミナー資料'], row['カテゴリー']].join(' ').toLowerCase();
            return (req.length === 0 || req.every(t => txt.includes(t))) && (exc.length === 0 || exc.every(t => !txt.includes(t)));
          });
        }
        if (filtersSeminar['カテゴリー'] && filtersSeminar['カテゴリー'].length > 0) {
          result = result.filter(row => filtersSeminar['カテゴリー'].some(f => (row['カテゴリー'] || '').includes(f)));
        }
        // 開催日（降順）固定
        result.sort((a, b) => {
          const timeA = a['開催日'] ? new Date(a['開催日']).getTime() : 0;
          const timeB = b['開催日'] ? new Date(b['開催日']).getTime() : 0;
          return timeB - timeA;
        });
        return result;
      }, [seminarData, searchQuerySeminar, filtersSeminar]);

      const setSeminarMobileFilter = (value) => {
        setFiltersSeminar(prev => ({ ...prev, 'カテゴリー': value ? [value] : [] }));
      };

      const hasActiveSeminarFilters = filtersSeminar['カテゴリー'] && filtersSeminar['カテゴリー'].length > 0;

      // URLが存在する最初の行のインデックスを取得（coming soon判定用）
      const firstUrlIndexSeminar = useMemo(() => {
        return filteredSeminarData.findIndex(row => {
          const hasVideo = row['🎦動画をみる'] && row['🎦動画をみる'].trim() !== '';
          const hasUrl = row['セミナーURL'] && row['セミナーURL'].trim() !== '';
          return hasVideo || hasUrl;
        });
      }, [filteredSeminarData]);

      // セミナーリスト表示用（準備中の表示/非表示をコントロール）
      const visibleSeminarList = useMemo(() => {
        return filteredSeminarData.map((row, index) => {
          const isComingSoon = firstUrlIndexSeminar !== -1 && index < firstUrlIndexSeminar;
          return { ...row, _isComingSoon: isComingSoon, _originalIndex: index };
        }).filter(row => showComingSoon || !row._isComingSoon);
      }, [filteredSeminarData, showComingSoon, firstUrlIndexSeminar]);

      // セミナーのカード表示用（URLか動画リンクが存在するものだけフィルタリング）
      const seminarCards = useMemo(() => {
        return filteredSeminarData.filter(row => {
          const hasVideo = row['🎦動画をみる'] && row['🎦動画をみる'].trim() !== '';
          const hasUrl = row['セミナーURL'] && row['セミナーURL'].trim() !== '';
          return hasVideo || hasUrl;
        });
      }, [filteredSeminarData]);

      // --- Q&A用 ロジック ---
      const filteredQaItems = useMemo(() => {
        let result = [...qaItems];
        if (searchQueryQa.trim()) {
          const terms = searchQueryQa.trim().replace(/　/g, ' ').split(/\s+/);
          const req = terms.filter(t => !t.startsWith('-')).map(t => t.toLowerCase());
          const exc = terms.filter(t => t.startsWith('-') && t.length > 1).map(t => t.substring(1).toLowerCase());
          result = result.filter(item => {
            const txt = [item.q || '', item.a || ''].join(' ').toLowerCase();
            return (req.length === 0 || req.every(t => txt.includes(t))) && (exc.length === 0 || exc.every(t => !txt.includes(t)));
          });
        }
        return result;
      }, [qaItems, searchQueryQa]);


      // --- Firebase Auth & Firestore (Googleログイン＋クラウドステーション用データ) ---
      useEffect(() => {
        if (!auth) {
          setAuthLoading(false);
          setAuthError('Firebase Authを初期化できませんでした。');
          return;
        }

        // signInWithRedirect から戻ってきた後の結果を念のため取得します。
        // 通常は onAuthStateChanged でもログイン状態を拾えますが、
        // エラー確認・デバッグのため getRedirectResult も実行します。
        getRedirectResult(auth)
          .then((result) => {
            if (result && result.user) {
              console.log('Redirect sign-in success:', result.user.email);
            }
          })
          .catch((err) => {
            console.error('Redirect result error:', err);
            setAuthError(`Googleログインの結果取得に失敗しました。${err?.code || err?.message || ''}`);
          });

        const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
          if (currentUser && !isAllowedEmail(currentUser.email)) {
            const email = currentUser.email || '';
            await signOut(auth);
            setUser(null);
            setAuthError(`${email} はこのサイトの利用対象外です。組織アカウントでログインしてください。`);
            setAuthLoading(false);
            return;
          }
          setUser(currentUser);
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleSignIn = async () => {
        if (!auth) return;
        try {
          setAuthError(null);
          setAuthLoading(true);
          const provider = new GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          await signInWithRedirect(auth, provider);
        } catch (err) {
          console.error('Google sign-in error:', err);
          setAuthLoading(false);
          setAuthError(`Googleログインに失敗しました。${err?.code || err?.message || ''}`);
        }
      };

      useEffect(() => {
        setIsScrolled((scrollPositions.current[activeTab] || 0) > 10);
      }, [activeTab]);

      // スクロール位置の復元
      useEffect(() => {
        const restoreScroll = () => {
          if (scrollContainerRef.current) {
            const pos = scrollPositions.current[activeTab] || 0;
            scrollContainerRef.current.scrollTop = pos;
            if (activeTab === 'news') {
              setNewsScrollTop(pos);
            }
          }
        };
        // DOM要素のレンダリング直後に復元させるため setTimeout を使用
        const timer = setTimeout(restoreScroll, 0);
        return () => clearTimeout(timer);
      }, [activeTab, seminarViewMode, isMobileView]);

      // --- 新着ニュース 仮想スクロール用 Height計算 & スクロールリセット ---
      useEffect(() => {
        const updateHeight = () => {
          if (activeTab === 'news' && scrollContainerRef.current) {
            setNewsContainerHeight(scrollContainerRef.current.clientHeight);
          }
        };
        updateHeight();
        window.addEventListener('resize', updateHeight);
        return () => window.removeEventListener('resize', updateHeight);
      }, [activeTab]);

      // 画面幅に応じてスマホ用UIを切り替える
      useEffect(() => {
        const mediaQuery = window.matchMedia('(max-width: 767px)');
        const updateMobileView = () => setIsMobileView(mediaQuery.matches);
        updateMobileView();

        if (mediaQuery.addEventListener) {
          mediaQuery.addEventListener('change', updateMobileView);
          return () => mediaQuery.removeEventListener('change', updateMobileView);
        }

        mediaQuery.addListener(updateMobileView);
        return () => mediaQuery.removeListener(updateMobileView);
      }, []);

      // ニュースでの検索・フィルター変更時にスクロール位置をリセット
      useEffect(() => {
        if (activeTab === 'news' && scrollContainerRef.current) {
          scrollContainerRef.current.scrollTop = 0;
          setNewsScrollTop(0);
          scrollPositions.current['news'] = 0;
        }
      }, [searchQueryNews, filtersNews]);

      // スマホ版ニュースカードは、全件一括描画せず段階表示する
      useEffect(() => {
        if (activeTab === 'news' && isMobileView) {
          setMobileNewsVisibleCount(30);
        }
      }, [activeTab, isMobileView, searchQueryNews, filtersNews]);

      // スマホ版資料カードは、全件一括描画せず段階表示する
      useEffect(() => {
        if (activeTab === 'cloud_station' && isMobileView) {
          setMobileCloudVisibleCount(30);
        }
      }, [activeTab, isMobileView, searchQueryCloud, filtersCloud]);

      // セミナーカード表示は、PC/スマホともに段階表示する
      useEffect(() => {
        if (activeTab === 'seminar' && (isMobileView || seminarViewMode === 'card')) {
          setSeminarCardVisibleCount(30);
        }
      }, [activeTab, isMobileView, seminarViewMode, searchQuerySeminar, filtersSeminar]);

      const handleScroll = (e) => {
        const scrollTop = e.target.scrollTop;
        if (scrollTop > 10) {
          setIsScrolled(true);
        } else {
          setIsScrolled(false);
        }
        scrollPositions.current[activeTab] = scrollTop;
        if (activeTab === 'news') {
          setNewsScrollTop(scrollTop);
        }
      };

      const scrollActiveTabToTop = () => {
        if (scrollContainerRef.current) {
          scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
        scrollPositions.current[activeTab] = 0;
        if (activeTab === 'news') {
          setNewsScrollTop(0);
        }
        setIsScrolled(false);
      };

      const getScrollTopButtonClass = () => {
        switch (activeTab) {
          case 'cloud_station': return 'bg-blue-50 text-blue-700 border-blue-100 hover:bg-blue-100 hover:text-blue-800 focus:ring-blue-300';
          case 'news': return 'bg-orange-50 text-orange-700 border-orange-200 hover:bg-orange-100 hover:text-orange-800 focus:ring-orange-300';
          case 'seminar': return 'bg-[#3d98b3]/10 text-[#3d98b3] border-[#3d98b3]/20 hover:bg-[#3d98b3]/20 focus:ring-[#3d98b3]/30';
          case 'qa': return 'bg-violet-50 text-violet-700 border-violet-200 hover:bg-violet-100 hover:text-violet-800 focus:ring-violet-300';
          default: return 'bg-slate-50 text-slate-700 border-slate-200 hover:bg-slate-100 focus:ring-slate-300';
        }
      };

      const renderScrollTopButton = () => {
        if (!isScrolled) return null;
        return (
          <button
            type="button"
            onClick={(e) => { e.stopPropagation(); scrollActiveTabToTop(); }}
            className={`flex-shrink-0 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-extrabold border shadow-sm transition-all duration-200 outline-none focus:ring-2 focus:ring-offset-1 ${getScrollTopButtonClass()}`}
            title="現在のタブの最上部へ戻る"
          >
            <ArrowDown className="w-3.5 h-3.5 rotate-180" />
            <span className="whitespace-nowrap">上へ</span>
          </button>
        );
      };

      const renderNewsArchiveButton = () => {
        if (newsArchiveLoaded) {
          return (
            <div className="inline-flex max-w-full items-center gap-2 rounded-full border border-orange-100 bg-orange-50/70 px-3 py-1.5 text-[11px] sm:text-xs font-bold text-orange-700 shadow-sm">
              <span className="h-1.5 w-1.5 flex-shrink-0 rounded-full bg-orange-500"></span>
              <span className="truncate">検索対象：全ニュース（過去{newsArchiveData.length}件追加）</span>
            </div>
          );
        }

        return (
          <div className="inline-flex max-w-full flex-wrap items-center gap-2 rounded-full border border-orange-100 bg-orange-50/60 px-2.5 py-1.5 text-[11px] sm:text-xs shadow-sm">
            <span className="font-extrabold text-slate-600 whitespace-nowrap">{searchQueryNews.trim() ? '検索対象：最新300件内' : '検索対象：最新300件'}</span>
            <button
              type="button"
              onClick={() => loadTabData('news_archive')}
              disabled={newsArchiveLoading}
              className="inline-flex flex-shrink-0 items-center justify-center gap-1.5 rounded-full border border-orange-200 bg-white px-2.5 py-1 text-[11px] sm:text-xs font-extrabold text-orange-700 shadow-sm hover:bg-orange-100 disabled:opacity-60 disabled:cursor-wait transition-colors"
            >
              {newsArchiveLoading && <Loader2 className="h-3.5 w-3.5 animate-spin" />}
              {newsArchiveLoading ? '読込中' : (searchQueryNews.trim() ? '過去も検索' : '過去も含める')}
            </button>
            {newsArchiveError && <span className="basis-full text-[11px] font-bold text-red-600">{newsArchiveError}</span>}
          </div>
        );
      };

      useEffect(() => {
        if (!user || !db) return;
        
        // Q&Aの購読
        const qaRef = collection(db, 'artifacts', appId, 'public', 'data', 'qa_items');
        const unsubscribeQa = onSnapshot(qaRef, 
          (snapshot) => {
            const items = [];
            snapshot.forEach(doc => { items.push({ id: doc.id, ...doc.data() }); });
            items.sort((a, b) => new Date(b.createdAt || 0).getTime() - new Date(a.createdAt || 0).getTime());
            setQaItems(items);
          },
          (err) => { console.error("QA read error:", err); }
        );

        // フィードバックの購読
        const fbRef = collection(db, 'artifacts', appId, 'public', 'data', 'feedbacks');
        const unsubscribeFb = onSnapshot(fbRef, 
          (snapshot) => {
            const newFeedbacks = {};
            snapshot.forEach(doc => {
              newFeedbacks[doc.id] = doc.data().text;
            });
            setFeedbacks(newFeedbacks);
          },
          (err) => { console.error("Feedback read error:", err); }
        );

        return () => {
          unsubscribeQa();
          unsubscribeFb();
        };
      }, [user, db]);

      // GASのWebアプリURL
      const GAS_URL = "https://script.google.com/macros/s/AKfycbyRmt1oC3py6LR1N_W-yMc8e3ol62cpvhoK-HiiAZ7guRR5cCdAMZ3IToOnEHAlsMAp/exec";

      const buildUserLogPayload = () => ({
        uid: user?.uid || '',
        email: user?.email || '',
        displayName: user?.displayName || '',
        providerId: user?.providerData?.[0]?.providerId || '',
        sessionId: sessionIdRef.current,
        activeTab,
        pageTitle: typeof document !== 'undefined' ? document.title : '',
        pageUrl: typeof window !== 'undefined' ? window.location.href : '',
        userAgent: typeof navigator !== 'undefined' ? navigator.userAgent : '',
        timestamp: new Date().toISOString(),
        timestampJst: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' })
      });

      const saveAccessLog = async (action, detail = {}) => {
        if (!user || !db) return;
        const logData = {
          action,
          ...buildUserLogPayload(),
          ...detail
        };
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'access_logs'), logData);
        } catch (err) {
          console.error('Access log save error:', err);
        }

        // page_view は管理用スプレッドシートにも送信します。
        // document_click は trackClick 内の add_click_log で既にGASへ送信するため、ここでは二重送信しません。
        if (GAS_URL && action === 'page_view') {
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'add_access_log',
              payloadVersion: 'v2',
              ...logData
            })
          }).catch(e => console.error('GAS送信エラー:', e));
        }
      };

      // ページ訪問ログ：1回のブラウザセッションにつき、このReactアプリ初回表示時に1件保存
      useEffect(() => {
        if (!user || !db || accessLoggedRef.current) return;
        accessLoggedRef.current = true;
        saveAccessLog('page_view', {
          path: typeof window !== 'undefined' ? window.location.pathname : '',
          referrer: typeof document !== 'undefined' ? document.referrer : ''
        });
      }, [user?.uid]);

      const handleSaveQa = async (idAndField, text) => {
        if (!user || !db) return;
        const [id, field] = idAndField.split('___');
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'qa_items', id);
          await setDoc(docRef, { [field]: text, updatedAt: new Date().toISOString(), updatedBy: user.uid }, { merge: true });
          
          // 現在のステートをベースに、更新後のQ&A全データを構築
          const newQaItems = qaItems.map(item => item.id === id ? { ...item, [field]: text } : item);
          const dataToSend = newQaItems.map(item => ({ q: item.q || '', a: item.a || '' }));

          // GASへ全件同期送信
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'sync_qa',
              data: dataToSend
            })
          }).catch(e => console.error("GAS送信エラー:", e));

        } catch (err) { console.error("Save error:", err); }
      };

      const handleAddQa = async () => {
        if (!user || !db) return;
        try {
          const newId = `qa_${Date.now()}`;
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'qa_items', newId);
          await setDoc(docRef, { q: '', a: '', createdAt: new Date().toISOString(), createdBy: user.uid });

          // 現在のステートをベースに、追加後のQ&A全データを構築
          const newQaItems = [{ id: newId, q: '', a: '' }, ...qaItems];
          const dataToSend = newQaItems.map(item => ({ q: item.q || '', a: item.a || '' }));

          // GASへ全件同期送信
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'sync_qa',
              data: dataToSend
            })
          }).catch(e => console.error("GAS送信エラー:", e));

        } catch (err) { console.error("Add error:", err); }
      };

      const handleDeleteQa = async (id) => {
        if (!user || !db) return;
        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'qa_items', id);
          await deleteDoc(docRef);
          
          // 現在のステートをベースに、削除後のQ&A全データを構築
          const newQaItems = qaItems.filter(item => item.id !== id);
          const dataToSend = newQaItems.map(item => ({ q: item.q || '', a: item.a || '' }));

          // GASへ全件同期送信
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'sync_qa',
              data: dataToSend
            })
          }).catch(e => console.error("GAS送信エラー:", e));

          setToastMessage("Q＆Aを削除しました"); setTimeout(() => setToastMessage(null), 3000);
        } catch (err) { console.error("Delete error:", err); }
      };

      const handleSaveFeedback = async (docName, text) => {
        if (!user || !db) return;
        try {
          const safeId = encodeURIComponent(docName).replace(/\./g, '%2E');
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'feedbacks', safeId);
          await setDoc(docRef, { text, updatedAt: new Date().toISOString(), updatedBy: user.uid }, { merge: true });
          
          // 現在のステートをベースに、更新後の改善案全データを構築
          const newFeedbacks = { ...feedbacks, [safeId]: text };
          
          // クラウドステーションの全資料をベースに、コメントの有無に関わらず全件のリストを作成
          const dataToSend = cloudStationData.map(row => {
            const name = row['資料名（YYYYMMDD_資料名）'];
            const id = encodeURIComponent(name).replace(/\./g, '%2E');
            return {
              docName: name,
              text: newFeedbacks[id] || ''
            };
          });

          // GASへ全件同期送信
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'sync_feedbacks',
              data: dataToSend
            })
          }).catch(e => console.error("GAS送信エラー:", e));

        } catch (err) { console.error("Save error:", err); }
      };

      const handleAddNewsSubmit = async (e) => {
        e.preventDefault();
        if (!user) return;
        setIsSubmittingNews(true);
        try {
          // GASへニュース追加情報を送信
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'add_news',
              url: newsFormData.url,
              date: newsFormData.date,
              title: newsFormData.title,
              body: newsFormData.body,
              userId: user.uid,
              email: user.email || '',
              displayName: user.displayName || ''
            })
          }).catch(err => console.error("GAS送信エラー:", err));
          
          setToastMessage("ニュースを追加しました（スプレッドシートへ送信済）");
          setTimeout(() => setToastMessage(null), 3000);
          setShowAddNewsModal(false);
          setNewsFormData({ url: '', date: '', title: '', body: '' });
        } catch (err) {
          console.error(err);
        } finally {
          setIsSubmittingNews(false);
        }
      };

      const trackClick = (name, url, type) => { 
        // 1. GA4計測（メールアドレスなどの個人情報はGA4へ送らない）
        if (typeof window !== 'undefined' && window.gtag) {
          window.gtag('event', 'document_click', { document_name: name, link_url: url, link_type: type }); 
        }

        // 2. Firestoreへユーザー別クリックログを保存
        saveAccessLog('document_click', {
          documentName: name || '',
          linkUrl: url || '',
          linkType: type || ''
        });

        // 3. GAS（スプレッドシート）へ送信。既存ログにもメールアドレスを追加。
        if (GAS_URL) {
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              type: 'add_click_log',
              name: name || '',
              url: url || '',
              clickType: type || '',
              userId: user ? user.uid : 'anonymous',
              uid: user ? user.uid : '',
              email: user ? (user.email || '') : '',
              displayName: user ? (user.displayName || '') : '',
              sessionId: sessionIdRef.current,
              activeTab,
              timestamp: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' })
            })
          }).catch(e => console.error("GAS送信エラー:", e));
        }
      };

      const handleCopyPath = (text, name) => {
        const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.left = "-999999px";
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); setToastMessage("パスをコピーしました"); setTimeout(() => setToastMessage(null), 3000); trackClick(name, text, 'copy'); } catch (e) {}
        ta.remove();
      };

      const scrollToFeedbackHeader = () => {
        const el = document.getElementById('feedback-header');
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' }); setTimeout(() => { setIsHeaderBlinking(true); setTimeout(() => setIsHeaderBlinking(false), 3000); }, 600); }
      };

      if (authLoading) {
        return (
          <div className="h-screen min-h-[500px] relative flex items-center justify-center font-sans bg-mesh overflow-hidden">
            <div className="absolute inset-0 bg-pattern pointer-events-none"></div>
            <div className="relative bg-white/80 backdrop-blur-2xl border border-white/70 rounded-3xl shadow-2xl px-8 py-7 flex items-center gap-3 text-slate-700 font-bold">
              <Loader2 className="w-5 h-5 animate-spin text-blue-500" />
              認証状態を確認しています...
            </div>
          </div>
        );
      }

      if (!user) {
        return (
          <div className="h-screen min-h-[500px] relative flex items-center justify-center font-sans bg-mesh overflow-hidden px-5">
            <div className="absolute inset-0 bg-pattern pointer-events-none"></div>
            <div className="relative w-full max-w-md bg-white/85 backdrop-blur-2xl border border-white/70 rounded-3xl shadow-2xl p-8 text-center">
              <div className="mx-auto w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white shadow-lg mb-5">
                <Cloud className="w-8 h-8" />
              </div>
              <h1 className="text-2xl font-black text-slate-800 mb-2">Cloud Station</h1>
              <p className="text-sm text-slate-600 leading-relaxed mb-6">
                利用状況の把握と資料改善のため、組織アカウントでログインしてください。アクセス日時・クリックした資料・ログイン中のメールアドレスを記録します。
              </p>
              {authError && (
                <div className="mb-4 text-xs text-rose-700 bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 text-left leading-relaxed">
                  {authError}
                </div>
              )}
              <button
                type="button"
                onClick={handleSignIn}
                className="w-full py-3.5 px-5 rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-extrabold shadow-lg transition-all flex items-center justify-center gap-2"
              >
                Googleアカウントで続行
              </button>
              <p className="mt-4 text-[11px] text-slate-400 leading-relaxed">
                Google Sitesの閲覧権限がある組織アカウントでログインしてください。
              </p>
            </div>
          </div>
        );
      }

      return (
        <div className="h-screen min-h-[500px] relative flex flex-col font-sans selection:bg-indigo-200 bg-mesh overflow-hidden" onClick={() => { setEditingCellId(null); setOpenFilter(null); setShowNewsHelp(false); }}>
          <style>{`
            .bg-mesh {
              background-color: #f1f5f9;
              background-image: 
                radial-gradient(at 40% 20%, hsla(228,100%,92%,0.8) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189,100%,92%,0.8) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(310,100%,95%,0.8) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(240,100%,92%,0.8) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(200,100%,92%,0.8) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(280,100%,92%,0.8) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(260,100%,92%,0.8) 0px, transparent 50%);
            }
            .bg-pattern { background-image: radial-gradient(rgba(15, 23, 42, 0.04) 1px, transparent 1px); background-size: 20px 20px; }
            .custom-scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.4); border-radius: 20px; border: 2px solid transparent; background-clip: padding-box; }
            .mini-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
            .mini-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(203, 213, 225, 0.5); border-radius: 10px; }
            
            @keyframes blink-highlight { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(255, 255, 255, 0.4); } }
            .animate-blink { animation: blink-highlight 1.5s ease-in-out 2; }
            @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
            .animate-shine { background-size: 200% auto; animation: shine 3s linear infinite; }

            /* 一閃エフェクト（1回切り） */
            @keyframes sword-slash-once {
              0% { left: -50%; width: 0; opacity: 0; }
              10% { left: -10%; width: 60%; opacity: 1; }
              30% { left: 100%; width: 40%; opacity: 1; }
              40%, 100% { left: 150%; width: 0; opacity: 0; }
            }
            /* テキスト輝きエフェクト（明るい背景用） */
            @keyframes text-glow-once {
              0% { background-position: 100% center; -webkit-text-fill-color: #94a3b8; } 
              5% { background-position: 100% center; -webkit-text-fill-color: transparent; }
              30% { text-shadow: 0 0 20px rgba(59,130,246,0.6); }
              60% { background-position: 0% center; -webkit-text-fill-color: transparent; text-shadow: none; }
              65%, 100% { background-position: 0% center; -webkit-text-fill-color: #1e293b; } 
            }

          {showAddNewsModal && (
            <div className="fixed inset-0 z-[150] flex items-center justify-center bg-slate-800/60 backdrop-blur-sm p-4 animate-fade-in" onClick={() => !isSubmittingNews && setShowAddNewsModal(false)}>
              <div className="bg-white rounded-3xl shadow-2xl max-w-lg w-full overflow-hidden border border-slate-200" onClick={(e) => e.stopPropagation()}>
                <div className="bg-gradient-to-r from-orange-500 to-amber-500 px-6 py-4 flex justify-between items-center text-white">
                  <h3 className="font-extrabold text-lg flex items-center gap-2"><Pigeon className="w-5 h-5 animate-fly-pigeon" /> 新しいニュースを追加</h3>
                  <button onClick={() => setShowAddNewsModal(false)} className="text-white/70 hover:text-white transition-colors disabled:opacity-50" disabled={isSubmittingNews}><X className="w-6 h-6" /></button>
                </div>
                <form onSubmit={handleAddNewsSubmit} className="p-6 flex flex-col gap-4 bg-slate-50/50">
                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-slate-700">ニュースのURL <span className="text-red-500">*</span></label>
                    <input type="url" required value={newsFormData.url} onChange={(e) => setNewsFormData({...newsFormData, url: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400/50 focus:border-orange-500 bg-white" placeholder="https://..." disabled={isSubmittingNews} />
                  </div>
                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-slate-700">ニュースの日付 <span className="text-red-500">*</span></label>
                    <input type="date" required value={newsFormData.date} onChange={(e) => setNewsFormData({...newsFormData, date: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400/50 focus:border-orange-500 bg-white" disabled={isSubmittingNews} />
                  </div>
                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-slate-700">ニュースタイトル <span className="text-red-500">*</span></label>
                    <input type="text" required value={newsFormData.title} onChange={(e) => setNewsFormData({...newsFormData, title: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400/50 focus:border-orange-500 bg-white" placeholder="タイトルのテキスト" disabled={isSubmittingNews} />
                  </div>
                  <div className="flex flex-col gap-1.5">
                    <label className="text-xs font-bold text-slate-700">ニュース記事本文 <span className="text-red-500">*</span></label>
                    <textarea required value={newsFormData.body} onChange={(e) => setNewsFormData({...newsFormData, body: e.target.value})} className="w-full px-4 py-2.5 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400/50 focus:border-orange-500 bg-white min-h-[100px] resize-none custom-scrollbar" placeholder="記事の本文や要約など" disabled={isSubmittingNews}></textarea>
                  </div>
                  <div className="pt-2 flex justify-end gap-3">
                    <button type="button" onClick={() => setShowAddNewsModal(false)} className="px-5 py-2.5 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-xl transition-colors disabled:opacity-50" disabled={isSubmittingNews}>キャンセル</button>
                    <button type="submit" className="px-6 py-2.5 text-sm font-bold text-white bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 rounded-xl shadow-md shadow-orange-500/20 transition-all flex items-center gap-2 disabled:opacity-70" disabled={isSubmittingNews}>
                      {isSubmittingNews ? <Loader2 className="w-4 h-4 animate-spin" /> : <Plus className="w-4 h-4" />}
                      ニュースを追加
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className={`fixed bottom-6 right-6 z-[200] bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 transition-all duration-300 transform border border-slate-800 ${toastMessage ? 'translate-y-0 opacity-100' : 'translate-y-12 opacity-0 pointer-events-none'}`}>
            <Check className="w-5 h-5 text-blue-400" />
            <span className="text-sm font-bold tracking-wide">{toastMessage}</span>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
