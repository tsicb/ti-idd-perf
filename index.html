<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>天市×indeedPLUS運用実績</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');
    :root {
      --bg1:#fef3c7; --bg2:#ffedd5; --bg3:#fef9c3;
      --card:rgba(255,255,255,.92); --text:#44403c; --muted:#78716c; --line:#f5f5f4;
      --orange:#f97316; --orangeDark:#c2410c; --sky:#0ea5e9; --skyDark:#0369a1;
      --green:#059669; --rose:#e11d48; --amber:#d97706; --violet:#7c3aed; --stone:#a8a29e;
      --shadow:0 12px 24px -8px rgba(0,0,0,.15); --radius:2rem;
    }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; color:var(--text);
      font-family:'Zen Maru Gothic', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);
      background-attachment:fixed;
    }
    .wrap { max-width:1800px; margin:0 auto; padding:24px 18px 48px; }
    .card {
      background:var(--card); backdrop-filter:blur(14px); border:4px solid #fff;
      border-radius:var(--radius); box-shadow:var(--shadow); padding:24px;
    }
    .header { display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:space-between; gap:18px; margin-bottom:18px; }
    h1 { margin:0; font-size:clamp(25px,3vw,36px); letter-spacing:.02em; color:#292524; display:flex; align-items:center; gap:12px; }
    h1::before { content:'📊'; font-size:30px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.12)); }
    h2 { margin:0 0 14px; font-size:20px; color:#44403c; }
    h3 { margin:0 0 10px; font-size:16px; }
    p { line-height:1.7; }
    .muted { color:var(--muted); }
    .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace; }
    .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:18px; }
    .span-12 { grid-column:span 12; } .span-9 { grid-column:span 9; } .span-8 { grid-column:span 8; } .span-6 { grid-column:span 6; } .span-4 { grid-column:span 4; } .span-3 { grid-column:span 3; }
    @media (max-width:1100px) { .span-9,.span-8,.span-6,.span-4,.span-3 { grid-column:span 12; } }
    input[type="file"] { display:none; }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px; border:0; border-radius:18px;
      padding:12px 18px; font-weight:900; cursor:pointer; color:#fff; text-decoration:none; white-space:nowrap;
      background:linear-gradient(180deg,#fb923c,#f97316); box-shadow:0 5px 0 var(--orangeDark); transition:.12s;
    }
    .btn:hover { filter:brightness(1.04); transform:translateY(-1px); }
    .btn:active { transform:translateY(5px); box-shadow:none; }
    .btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }
    .btn.secondary { background:linear-gradient(180deg,#38bdf8,#0ea5e9); box-shadow:0 5px 0 var(--skyDark); }
    .btn.ghost { background:linear-gradient(180deg,#fafaf9,#e7e5e4); color:#57534e; box-shadow:0 5px 0 #d6d3d1; }
    .btn.small { padding:8px 12px; border-radius:14px; font-size:13px; box-shadow:0 4px 0 #d6d3d1; }
    .toolbar, .filters, .actions, .chips { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
    .status {
      display:inline-flex; align-items:center; gap:8px; padding:9px 13px; border-radius:999px;
      font-weight:900; font-size:13px; background:#f5f5f4; color:#57534e; border:2px solid #fff;
    }
    .status.ok { background:#dcfce7; color:#047857; } .status.warn { background:#fef3c7; color:#b45309; } .status.bad { background:#ffe4e6; color:#be123c; }
    .field { display:grid; gap:6px; min-width:180px; flex:1; }
    .field.sm { flex:0 0 150px; min-width:140px; } .field.md { flex:0 0 210px; min-width:180px; }
    label.label { font-size:13px; font-weight:950; color:#57534e; display:flex; align-items:center; gap:6px; }
    input[type="text"], select {
      width:100%; border:4px solid #fff; background:#fafaf9; border-radius:18px; padding:12px 13px;
      font-weight:800; color:#44403c; outline:none; box-shadow:inset 0 2px 4px rgba(0,0,0,.05); font-family:inherit;
    }
    input[type="text"]:focus, select:focus { border-color:#7dd3fc; background:#fff; box-shadow:0 0 0 4px #e0f2fe, inset 0 2px 4px rgba(0,0,0,.05); }
    .hintbar {
      margin-top:14px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; color:#57534e; font-size:13px; font-weight:800;
    }
    .hintpill { background:#fff7ed; color:#9a3412; border:2px solid #fed7aa; border-radius:999px; padding:6px 10px; }
    .stats { display:grid; grid-template-columns:repeat(8,minmax(125px,1fr)); gap:12px; }
    @media (max-width:1300px) { .stats { grid-template-columns:repeat(4,minmax(130px,1fr)); } }
    @media (max-width:720px) { .stats { grid-template-columns:repeat(2,minmax(130px,1fr)); } }
    .stat { background:#fff; border:2px solid #f5f5f4; border-radius:22px; padding:14px; min-height:88px; box-shadow:0 8px 16px -14px rgba(0,0,0,.2); }
    .stat-title { color:var(--muted); font-size:12px; font-weight:950; }
    .stat-value { margin-top:8px; font-size:23px; font-weight:950; color:#292524; }
    .unit { color:var(--muted); font-size:13px; margin-left:3px; }
    .table-wrap { overflow:auto; max-height:560px; border:4px solid #fff; border-radius:22px; background:#fff; box-shadow:inset 0 2px 8px rgba(0,0,0,.03); }
    .table-wrap::-webkit-scrollbar { height:20px; width:12px; }
    .table-wrap::-webkit-scrollbar-track { background:#f5f5f4; border-radius:999px; }
    .table-wrap::-webkit-scrollbar-thumb { background:linear-gradient(to bottom,#d6d3d1,#a8a29e); border-radius:999px; border:3px solid #f5f5f4; }
    table { width:100%; border-collapse:separate; border-spacing:0; font-size:14px; }
    th,td { padding:11px 13px; border-right:2px solid #f5f5f4; border-bottom:2px solid #f5f5f4; text-align:left; vertical-align:top; white-space:nowrap; }
    th { background:#f5f5f4; color:#57534e; font-size:13px; font-weight:950; position:sticky; top:0; z-index:2; }
    tr:last-child td { border-bottom:0; }
    .pill { display:inline-flex; align-items:center; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:900; }
    .pill.ok { background:#d1fae5; color:#047857; } .pill.warn { background:#fef3c7; color:#b45309; } .pill.bad { background:#ffe4e6; color:#be123c; } .pill.sky { background:#e0f2fe; color:#0369a1; }
    .chip {
      border:2px solid #fed7aa; background:#fff7ed; color:#9a3412; border-radius:999px; padding:7px 11px;
      cursor:pointer; font-weight:900; font-size:13px; font-family:inherit; transition:.12s;
    }
    .chip:hover { filter:brightness(.98); transform:translateY(-1px); }
    .chip.selected { background:#f97316; color:#fff; border-color:#fdba74; }
    .chip.pinned { background:#0ea5e9; color:#fff; border-color:#7dd3fc; }
    .tabs { display:flex; gap:10px; flex-wrap:wrap; }
    .tab { border:0; border-radius:999px; padding:10px 15px; cursor:pointer; font-weight:950; background:#f5f5f4; color:#57534e; font-family:inherit; }
    .tab.active { background:#0ea5e9; color:#fff; box-shadow:0 4px 0 #0369a1; }
    .hidden { display:none!important; }
    .log { display:none; white-space:pre-wrap; background:#1c1917; color:#fafaf9; border-radius:18px; padding:14px; font-size:12px; max-height:280px; overflow:auto; }
    .empty { color:#78716c; padding:18px; background:#fafaf9; border-radius:18px; border:2px dashed #d6d3d1; font-weight:800; }
    .kv { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .kv div:nth-child(odd) { display:none; }
    .kv div:nth-child(even) { background:#f5f5f4; color:#57534e; border:2px solid #fff; border-radius:999px; padding:7px 11px; font-size:13px; font-weight:900; }
    .main-subtitle { margin:8px 0 0; color:#78716c; font-weight:800; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="header">
        <div>
          <h1>天市×indeedPLUS運用実績</h1>
          <p class="main-subtitle">データフォルダを選択して、求人運用データを確認できます。</p>
        </div>
        <div class="toolbar">
          <label class="btn" for="folderInput">📁 データフォルダを選択</label>
          <input id="folderInput" type="file" webkitdirectory directory multiple />
          <button id="refreshBtn" class="btn secondary" type="button" disabled>表示を更新</button>
          <button id="copyBtn" class="btn ghost" type="button" disabled>表をコピー</button>
          <span id="mainStatus" class="status">データ未選択</span>
        </div>
      </div>
      <div id="datasetInfo" class="kv hidden"></div>
    </section>

    <section id="appArea" class="grid hidden" style="margin-top:18px;">
      <div class="card span-12">
        <h2>検索条件</h2>
        <div class="filters">
          <div class="field">
            <label class="label" for="freeWordInput">🔎 フリーワード <span class="muted">※求人タイトルを検索</span></label>
            <input id="freeWordInput" type="text" placeholder="例：接客 販売" />
          </div>
          <div class="field">
            <label class="label" for="locationInput">📍 勤務地</label>
            <input id="locationInput" type="text" placeholder="例：東京 新宿" />
          </div>
          <div class="field sm">
            <label class="label" for="searchMode">検索モード</label>
            <select id="searchMode"><option value="OR">OR</option><option value="AND">AND</option></select>
          </div>
          <div class="field md">
            <label class="label" for="campaignFilter">キャンペーン</label>
            <select id="campaignFilter"><option value="all">すべて</option><option value="sa-only">SAのみ</option><option value="non-sa-only">SA以外</option></select>
          </div>
          <div class="field sm">
            <label class="label" for="periodFrom">開始月</label>
            <select id="periodFrom"></select>
          </div>
          <div class="field sm">
            <label class="label" for="periodTo">終了月</label>
            <select id="periodTo"></select>
          </div>
        </div>
      </div>

      <div class="card span-12">
        <h2>検索結果の合計</h2>
        <div id="stats" class="stats"></div>
      </div>

      <div class="card span-12">
        <div class="header" style="margin-bottom:10px;">
          <div>
            <h2>関連する職種</h2>
            <p class="muted" style="margin:4px 0 0;font-size:13px;">クリックすると比較表に追加できます。</p>
          </div>
          <button id="clearSelectedBtn" class="btn ghost small" type="button">選択をクリア</button>
        </div>
        <div id="selectedJobs" class="chips" style="margin-bottom:12px;"></div>
        <div id="relatedJobs" class="chips"></div>
      </div>

      <div class="card span-12">
        <div class="header" style="margin-bottom:12px;">
          <h2>比較表</h2>
          <div class="tabs">
            <button class="tab active" data-mode="job" type="button">職種比較</button>
            <button class="tab" data-mode="prefecture" type="button">都道府県比較</button>
            <button class="tab" data-mode="month" type="button">月別推移</button>
            <button class="tab" data-mode="period" type="button">期間A/B比較</button>
          </div>
        </div>
        <div id="periodCompareControls" class="filters hidden" style="margin-bottom:14px;padding:14px;background:#fafaf9;border-radius:18px;border:1px solid #e7e5e4;">
          <div class="field sm">
            <label class="label" for="compareAFrom">期間A 開始</label>
            <select id="compareAFrom"></select>
          </div>
          <div class="field sm">
            <label class="label" for="compareATo">期間A 終了</label>
            <select id="compareATo"></select>
          </div>
          <div class="field sm">
            <label class="label" for="compareBFrom">期間B 開始</label>
            <select id="compareBFrom"></select>
          </div>
          <div class="field sm">
            <label class="label" for="compareBTo">期間B 終了</label>
            <select id="compareBTo"></select>
          </div>
        </div>
        <div id="comparisonContent"></div>
      </div>

      <div id="debugLogArea" class="hidden">
        <div id="log" class="log"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import * as duckdb from "https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm/+esm";

    const els = {
      folderInput: document.getElementById('folderInput'), refreshBtn: document.getElementById('refreshBtn'), copyBtn: document.getElementById('copyBtn'), mainStatus: document.getElementById('mainStatus'),
      datasetInfo: document.getElementById('datasetInfo'), appArea: document.getElementById('appArea'), freeWordInput: document.getElementById('freeWordInput'), locationInput: document.getElementById('locationInput'),
      searchMode: document.getElementById('searchMode'), campaignFilter: document.getElementById('campaignFilter'), periodFrom: document.getElementById('periodFrom'), periodTo: document.getElementById('periodTo'),
      stats: document.getElementById('stats'), relatedJobs: document.getElementById('relatedJobs'), selectedJobs: document.getElementById('selectedJobs'), clearSelectedBtn: document.getElementById('clearSelectedBtn'),
      comparisonContent: document.getElementById('comparisonContent'), periodCompareControls: document.getElementById('periodCompareControls'), compareAFrom: document.getElementById('compareAFrom'), compareATo: document.getElementById('compareATo'), compareBFrom: document.getElementById('compareBFrom'), compareBTo: document.getElementById('compareBTo'), log: document.getElementById('log')
    };

    let dbPromise = null;
    let appState = null;
    let selectedJobTitles = [];
    let comparisonMode = 'job';
    let lastCopyRows = [];
    let logText = '';
    const registeredFiles = new Set();

    function setStatus(text, type='') { els.mainStatus.textContent = text; els.mainStatus.className = `status ${type}`.trim(); }
    function esc(v) { return String(v ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
    function fmtNum(v, digits=0) { if (v === null || v === undefined || v === '') return '-'; const n = typeof v === 'bigint' ? Number(v) : Number(v); if (!Number.isFinite(n)) return String(v); return n.toLocaleString('ja-JP',{maximumFractionDigits:digits,minimumFractionDigits:digits}); }
    function log(message) { const text = typeof message === 'string' ? message : JSON.stringify(message,null,2); logText += (logText ? '\n' : '') + text; els.log.textContent = logText; els.log.scrollTop = els.log.scrollHeight; }
    function clearLog() { logText = ''; els.log.textContent = ''; }
    function filePath(file) { return file.webkitRelativePath || file.name; }
    function normalizePath(path) { return String(path || '').replace(/\\/g, '/'); }
    function sqlLiteral(value) { return `'${String(value).replaceAll("'", "''")}'`; }
    function splitKeywords(text) { return String(text || '').split(/[\s　]+/).map(s => s.trim()).filter(Boolean); }
    function toPlainValue(value) { if (typeof value === 'bigint') return Number(value); if (value && typeof value === 'object' && typeof value.valueOf === 'function') { const v = value.valueOf(); if (typeof v !== 'object') return v; } return value; }
    function tableToRows(table) { const fields = table.schema.fields.map(f => f.name); return table.toArray().map(row => { if (row && typeof row.toJSON === 'function') { const json = row.toJSON(); const out = {}; Object.keys(json).forEach(k => out[k] = toPlainValue(json[k])); return out; } const out = {}; fields.forEach(name => out[name] = toPlainValue(row[name])); return out; }); }

    function findManifestFile(files) {
      const candidates = files.map(file => ({file, path: normalizePath(filePath(file))})).filter(item => item.path.endsWith('manifest.json'));
      return candidates.find(item => item.path.endsWith('/output_dataset/manifest.json')) || candidates.find(item => item.path === 'output_dataset/manifest.json') || candidates.find(item => item.path === 'manifest.json') || candidates[0] || null;
    }
    function datasetPrefixFromManifestPath(path) { const normalized = normalizePath(path); const marker = 'output_dataset/manifest.json'; const idx = normalized.indexOf(marker); if (idx >= 0) return normalized.slice(0, idx + 'output_dataset/'.length); return normalized.slice(0, normalized.length - 'manifest.json'.length); }
    function relativeToDataset(path, prefix) { const normalized = normalizePath(path); return prefix && normalized.startsWith(prefix) ? normalized.slice(prefix.length) : normalized; }
    function monthParts(yyyymm) { const s = String(yyyymm); return {year:Number(s.slice(0,4)), month:Number(s.slice(4,6))}; }
    function addMonths(yyyymm, offset) { const {year, month} = monthParts(yyyymm); const d = new Date(year, month - 1 + offset, 1); return String(d.getFullYear()) + String(d.getMonth()+1).padStart(2,'0'); }
    function formatMonthLabel(yyyymm) { const s = String(yyyymm || ''); return s.length === 6 ? `${s.slice(0,4)}年${s.slice(4,6)}月` : s; }
    function monthsBetween(from, to) { if (!from || !to) return []; let a = String(from), b = String(to); if (a > b) [a,b] = [b,a]; const out = []; let cur = a; while (cur <= b) { out.push(cur); cur = addMonths(cur, 1); if (out.length > 240) break; } return out; }
    function defaultFrom(monthMax) { return addMonths(monthMax, -11); }
    function maxMonthFromFactFiles(factFiles) { const m = factFiles.map(f => Number(f.month_key)).filter(Number.isFinite); return m.length ? Math.max(...m) : null; }

    async function getDb() {
      if (dbPromise) return dbPromise;
      dbPromise = (async () => {
        setStatus('準備中...', 'warn');
        const bundles = duckdb.getJsDelivrBundles();
        const bundle = await duckdb.selectBundle(bundles);
        const workerUrl = URL.createObjectURL(new Blob([`importScripts("${bundle.mainWorker}");`], {type:'text/javascript'}));
        const worker = new Worker(workerUrl);
        const logger = new duckdb.ConsoleLogger();
        const db = new duckdb.AsyncDuckDB(logger, worker);
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        URL.revokeObjectURL(workerUrl);
        
        return db;
      })();
      return dbPromise;
    }

    function renderKv(container, pairs) { container.innerHTML = pairs.map(([k,v]) => `<div>${esc(k)}</div><div>${v}</div>`).join(''); }

    async function handleFiles(fileList) {
      const files = Array.from(fileList || []);
      clearLog(); selectedJobTitles = []; registeredFiles.clear(); lastCopyRows = []; els.copyBtn.disabled = true;
      if (!files.length) return;
      setStatus('データ確認中...', 'warn');
      const manifestItem = findManifestFile(files);
      if (!manifestItem) { setStatus('データが見つかりません', 'bad'); log('データフォルダが正しく選択されていない可能性があります。output_dataset またはその親フォルダを選択してください。'); return; }
      const manifest = JSON.parse(await manifestItem.file.text());
      const prefix = datasetPrefixFromManifestPath(manifestItem.path);
      const selectedFileMap = new Map();
      files.forEach(file => selectedFileMap.set(normalizePath(relativeToDataset(filePath(file), prefix)), file));
      const factFiles = Array.isArray(manifest.fact_files) ? manifest.fact_files : [];
      const factFileMap = new Map(factFiles.map(info => [String(info.month_key), info]));
      const availableMonths = factFiles.map(f => String(f.month_key)).filter(m => selectedFileMap.has(normalizePath(factFileMap.get(m).path))).sort();
      const monthMax = manifest.month_max || maxMonthFromFactFiles(factFiles);
      appState = { files, manifest, manifestItem, prefix, selectedFileMap, factFiles, factFileMap, availableMonths, monthMax, sessionId: Date.now() };
      renderKv(els.datasetInfo, [
        ['range', `利用可能期間：${esc(formatMonthLabel(manifest.month_min))}〜${esc(formatMonthLabel(monthMax))}`],
        ['months', `読み込み可能な月：${esc(availableMonths.length)}か月分`],
        ['latest', `最新データ：${esc(formatMonthLabel(monthMax))}`]
      ]);
      els.datasetInfo.classList.remove('hidden');
      renderPeriodOptions();
      els.appArea.classList.remove('hidden');
      els.refreshBtn.disabled = false;
      setStatus('データ読込完了', 'ok');
      await refreshAll();
    }

    function renderPeriodOptions() {
      const months = appState.availableMonths;
      const max = String(appState.monthMax);
      const fromDefault = defaultFrom(max);
      els.periodFrom.innerHTML = months.map(m => `<option value="${esc(m)}">${esc(formatMonthLabel(m))}</option>`).join('');
      els.periodTo.innerHTML = months.map(m => `<option value="${esc(m)}">${esc(formatMonthLabel(m))}</option>`).join('');
      els.periodFrom.value = months.includes(fromDefault) ? fromDefault : months[0];
      els.periodTo.value = months.includes(max) ? max : months[months.length - 1];

      const opts = months.map(m => `<option value="${esc(m)}">${esc(formatMonthLabel(m))}</option>`).join('');
      els.compareAFrom.innerHTML = opts;
      els.compareATo.innerHTML = opts;
      els.compareBFrom.innerHTML = opts;
      els.compareBTo.innerHTML = opts;

      const bFrom = months.includes(fromDefault) ? fromDefault : months[0];
      const bTo = months.includes(max) ? max : months[months.length - 1];
      const aFromCandidate = addMonths(bFrom, -12);
      const aToCandidate = addMonths(bTo, -12);
      els.compareBFrom.value = bFrom;
      els.compareBTo.value = bTo;
      els.compareAFrom.value = months.includes(aFromCandidate) ? aFromCandidate : months[0];
      els.compareATo.value = months.includes(aToCandidate) ? aToCandidate : (months.includes(addMonths(bFrom, -1)) ? addMonths(bFrom, -1) : months[0]);
    }

    function selectedMonths() { return monthsBetween(els.periodFrom.value, els.periodTo.value).filter(m => appState.availableMonths.includes(m)); }

    async function registerMonths(db, months) {
      const paths = [];
      for (const month of months) {
        const info = appState.factFileMap.get(String(month));
        if (!info) continue;
        const relPath = normalizePath(info.path);
        const file = appState.selectedFileMap.get(relPath);
        if (!file) continue;
        const virtualPath = `session_${appState.sessionId}_${relPath.replaceAll('/', '_')}`;
        if (!registeredFiles.has(virtualPath)) {
          
          const buffer = await file.arrayBuffer();
          await db.registerFileBuffer(virtualPath, new Uint8Array(buffer));
          registeredFiles.add(virtualPath);
        }
        paths.push(virtualPath);
      }
      return paths;
    }

    function readExpr(paths) { return paths.length === 1 ? `read_parquet(${sqlLiteral(paths[0])})` : `read_parquet([${paths.map(sqlLiteral).join(', ')}])`; }

    function baseWhere(extraClauses=[]) {
      const mode = els.searchMode.value === 'AND' ? ' AND ' : ' OR ';
      const clauses = [];
      const titleWords = splitKeywords(els.freeWordInput.value);
      const locWords = splitKeywords(els.locationInput.value);
      if (titleWords.length) clauses.push('(' + titleWords.map(kw => `"タイトル" LIKE ${sqlLiteral('%' + kw + '%')}`).join(mode) + ')');
      if (locWords.length) clauses.push('(' + locWords.map(kw => `concat(coalesce("都道府県", ''), coalesce("市区町村", '')) LIKE ${sqlLiteral('%' + kw + '%')}`).join(mode) + ')');
      if (els.campaignFilter.value === 'sa-only') clauses.push(`coalesce("キャンペーン", '') LIKE '%SA-%'`);
      if (els.campaignFilter.value === 'non-sa-only') clauses.push(`coalesce("キャンペーン", '') NOT LIKE '%SA-%'`);
      extraClauses.forEach(c => clauses.push(c));
      return clauses.length ? 'WHERE ' + clauses.join(' AND ') : '';
    }

    function isUsefulCandidate(value) {
      const v = String(value || '').trim(); if (!v || v.length <= 1) return false;
      if (!/[一-龥々〆ヵヶぁ-ゖァ-ヺーA-Za-z0-9]/.test(v)) return false;
      const whitelist = new Set(['it','ai','pr','ec','pc','dx']);
      if (/^[a-z0-9]{1,2}$/i.test(v) && !whitelist.has(v.toLowerCase())) return false;
      return true;
    }

    async function queryRows(conn, sql) { const table = await conn.query(sql); return tableToRows(table); }

    async function refreshAll() {
      if (!appState) return;
      const months = selectedMonths();
      if (!months.length) { setStatus('対象月なし', 'bad'); return; }
      els.refreshBtn.disabled = true; setStatus('表示を更新中...', 'warn');
      try {
        const db = await getDb();
        const conn = await db.connect();
        try { await conn.query('LOAD parquet;'); } catch(e) { /* autoload環境では不要 */ }
        const paths = await registerMonths(db, months);
        const source = readExpr(paths);
        const where = baseWhere();
        const aggregateSql = `WITH src AS (SELECT * FROM ${source} ${where}) SELECT COUNT(*) AS count, COALESCE(SUM("消化金額"),0) AS cost, COALESCE(SUM("表示回数"),0) AS impressions, COALESCE(SUM("クリック数"),0) AS clicks, COALESCE(SUM("応募開始数"),0) AS apply_starts, COALESCE(SUM("応募数"),0) AS applies FROM src;`;
        const totals = (await queryRows(conn, aggregateSql))[0] || {};
        renderStats(totals);
        const relatedSql = `WITH src AS (SELECT * FROM ${source} ${where}), exploded AS (SELECT trim(candidate) AS related_job, "消化金額", "表示回数", "クリック数", "応募開始数", "応募数" FROM src, UNNEST(string_split(coalesce("関連職種", ''), '|')) AS t(candidate)) SELECT related_job, COUNT(*) AS count, COALESCE(SUM("消化金額"),0) AS cost, COALESCE(SUM("表示回数"),0) AS impressions, COALESCE(SUM("クリック数"),0) AS clicks, COALESCE(SUM("応募開始数"),0) AS apply_starts, COALESCE(SUM("応募数"),0) AS applies FROM exploded WHERE related_job <> '' GROUP BY related_job ORDER BY count DESC, applies DESC, clicks DESC, related_job ASC LIMIT 500;`;
        const relatedRaw = await queryRows(conn, relatedSql);
        renderRelated(relatedRaw.filter(r => isUsefulCandidate(r.related_job)).slice(0,50));
        await renderComparison(conn, source, db);
        await conn.close();
        setStatus(`表示中：${formatMonthLabel(months[0])}〜${formatMonthLabel(months[months.length-1])}`, 'ok');
      } catch (error) {
        console.error(error); log('[ERROR]\n' + (error.stack || error.message)); setStatus('表示エラー', 'bad');
      } finally { els.refreshBtn.disabled = false; }
    }

    function calcRates(row) {
      const cost = Number(row.cost || 0), imps = Number(row.impressions || 0), clicks = Number(row.clicks || 0), applies = Number(row.applies || 0);
      return { ctr: imps ? clicks / imps * 100 : null, cvr: clicks ? applies / clicks * 100 : null, cpc: clicks ? cost / clicks : null, cpa: applies ? cost / applies : null };
    }

    function renderStats(row) {
      const r = calcRates(row);
      const items = [['該当件数',fmtNum(row.count),'件'],['消化金額',fmtNum(row.cost),'円'],['表示回数',fmtNum(row.impressions),'回'],['クリック数',fmtNum(row.clicks),'回'],['応募開始数',fmtNum(row.apply_starts),'件'],['応募数',fmtNum(row.applies),'件'],['CVR',r.cvr===null?'-':fmtNum(r.cvr,2),'%'],['CPA',r.cpa===null?'-':fmtNum(r.cpa),'円']];
      els.stats.innerHTML = items.map(([title,value,unit]) => `<div class="stat"><div class="stat-title">${esc(title)}</div><div class="stat-value">${esc(value)}<span class="unit">${esc(unit)}</span></div></div>`).join('');
    }

    function renderSelectedJobs() {
      if (!selectedJobTitles.length) { els.selectedJobs.innerHTML = '<span class="muted">比較に追加された職種はありません。</span>'; return; }
      els.selectedJobs.innerHTML = selectedJobTitles.map(job => `<button class="chip pinned selected" data-remove-job="${esc(job)}" type="button">${esc(job)} ×</button>`).join('');
      els.selectedJobs.querySelectorAll('[data-remove-job]').forEach(btn => btn.addEventListener('click', () => { selectedJobTitles = selectedJobTitles.filter(j => j !== btn.dataset.removeJob); renderSelectedJobs(); refreshAll(); }));
    }

    function renderRelated(rows) {
      renderSelectedJobs();
      if (!rows.length) { els.relatedJobs.innerHTML = '<div class="empty">関連する職種が見つかりません。</div>'; return; }
      els.relatedJobs.innerHTML = rows.map(row => `<button class="chip ${selectedJobTitles.includes(row.related_job) ? 'selected' : ''}" data-job="${esc(row.related_job)}" type="button">${esc(row.related_job)} <span class="muted">${fmtNum(row.count)}</span></button>`).join('');
      els.relatedJobs.querySelectorAll('[data-job]').forEach(btn => btn.addEventListener('click', () => { const job = btn.dataset.job; selectedJobTitles = selectedJobTitles.includes(job) ? selectedJobTitles.filter(j => j !== job) : [...selectedJobTitles, job]; renderSelectedJobs(); refreshAll(); }));
    }

    async function renderComparison(conn, source, db) {
      updateComparisonControls();
      if (comparisonMode === 'job') return renderJobComparison(conn, source);
      if (comparisonMode === 'prefecture') return renderPrefComparison(conn, source);
      if (comparisonMode === 'period') return renderPeriodABComparison(conn, db);
      return renderMonthComparison(conn, source);
    }

    function updateComparisonControls() {
      els.periodCompareControls.classList.toggle('hidden', comparisonMode !== 'period');
    }

    function metricHeaders() { return '<th>該当件数</th><th>消化金額</th><th>表示回数</th><th>クリック数</th><th>応募開始数</th><th>応募数</th><th>CVR</th><th>CPA</th>'; }
    function metricCells(row) { const r = calcRates(row); return `<td>${fmtNum(row.count)}</td><td>${fmtNum(row.cost)}</td><td>${fmtNum(row.impressions)}</td><td>${fmtNum(row.clicks)}</td><td>${fmtNum(row.apply_starts)}</td><td>${fmtNum(row.applies)}</td><td>${r.cvr===null?'-':fmtNum(r.cvr,2)+'%'}</td><td>${r.cpa===null?'-':fmtNum(r.cpa)+'円'}</td>`; }

    async function renderJobComparison(conn, source) {
      if (!selectedJobTitles.length) { els.comparisonContent.innerHTML = '<div class="empty">上の職種候補をクリックすると、ここに職種別の比較表が表示されます。</div>'; lastCopyRows = []; els.copyBtn.disabled = true; return; }
      const selects = selectedJobTitles.map(job => `SELECT ${sqlLiteral(job)} AS label, COUNT(*) AS count, COALESCE(SUM("消化金額"),0) AS cost, COALESCE(SUM("表示回数"),0) AS impressions, COALESCE(SUM("クリック数"),0) AS clicks, COALESCE(SUM("応募開始数"),0) AS apply_starts, COALESCE(SUM("応募数"),0) AS applies FROM src WHERE "タイトル" LIKE ${sqlLiteral('%' + job + '%')}`).join(' UNION ALL ');
      const sql = `WITH src AS (SELECT * FROM ${source} ${baseWhere()}) ${selects} ORDER BY count DESC;`;
      const rows = await queryRows(conn, sql);
      renderTable('関連職種', rows);
    }

    async function renderPrefComparison(conn, source) {
      const sql = `WITH src AS (SELECT * FROM ${source} ${baseWhere()}) SELECT coalesce("都道府県", '（不明）') AS label, COUNT(*) AS count, COALESCE(SUM("消化金額"),0) AS cost, COALESCE(SUM("表示回数"),0) AS impressions, COALESCE(SUM("クリック数"),0) AS clicks, COALESCE(SUM("応募開始数"),0) AS apply_starts, COALESCE(SUM("応募数"),0) AS applies FROM src GROUP BY label ORDER BY CASE WHEN applies > 0 THEN cost / applies ELSE 999999999 END ASC, count DESC;`;
      const rows = await queryRows(conn, sql);
      renderTable('都道府県', rows);
    }

    async function renderMonthComparison(conn, source) {
      const sql = `WITH src AS (SELECT * FROM ${source} ${baseWhere()}) SELECT CAST("集計年月キー" AS VARCHAR) AS label, COUNT(*) AS count, COALESCE(SUM("消化金額"),0) AS cost, COALESCE(SUM("表示回数"),0) AS impressions, COALESCE(SUM("クリック数"),0) AS clicks, COALESCE(SUM("応募開始数"),0) AS apply_starts, COALESCE(SUM("応募数"),0) AS applies FROM src GROUP BY label ORDER BY label ASC;`;
      const rows = await queryRows(conn, sql);
      renderTable('集計年月', rows);
    }

    async function renderPeriodABComparison(conn, db) {
      const monthsA = monthsBetween(els.compareAFrom.value, els.compareATo.value).filter(m => appState.availableMonths.includes(m));
      const monthsB = monthsBetween(els.compareBFrom.value, els.compareBTo.value).filter(m => appState.availableMonths.includes(m));
      if (!monthsA.length || !monthsB.length) {
        els.comparisonContent.innerHTML = '<div class="empty">期間Aまたは期間Bの対象月がありません。</div>';
        lastCopyRows = [];
        els.copyBtn.disabled = true;
        return;
      }
      const pathsA = await registerMonths(db, monthsA);
      const pathsB = await registerMonths(db, monthsB);
      const sourceA = readExpr(pathsA);
      const sourceB = readExpr(pathsB);
      const where = baseWhere();
      const sql = `
WITH a AS (SELECT * FROM ${sourceA} ${where}),
     b AS (SELECT * FROM ${sourceB} ${where})
SELECT ${sqlLiteral('期間A：' + monthsA[0] + '〜' + monthsA[monthsA.length - 1])} AS label,
  COUNT(*) AS count,
  COALESCE(SUM("消化金額"),0) AS cost,
  COALESCE(SUM("表示回数"),0) AS impressions,
  COALESCE(SUM("クリック数"),0) AS clicks,
  COALESCE(SUM("応募開始数"),0) AS apply_starts,
  COALESCE(SUM("応募数"),0) AS applies
FROM a
UNION ALL
SELECT ${sqlLiteral('期間B：' + monthsB[0] + '〜' + monthsB[monthsB.length - 1])} AS label,
  COUNT(*) AS count,
  COALESCE(SUM("消化金額"),0) AS cost,
  COALESCE(SUM("表示回数"),0) AS impressions,
  COALESCE(SUM("クリック数"),0) AS clicks,
  COALESCE(SUM("応募開始数"),0) AS apply_starts,
  COALESCE(SUM("応募数"),0) AS applies
FROM b;`.trim();
      const rows = await queryRows(conn, sql);
      if (rows.length >= 2) {
        const a = rows[0], b = rows[1];
        rows.push({
          label: '差分：B − A',
          count: Number(b.count || 0) - Number(a.count || 0),
          cost: Number(b.cost || 0) - Number(a.cost || 0),
          impressions: Number(b.impressions || 0) - Number(a.impressions || 0),
          clicks: Number(b.clicks || 0) - Number(a.clicks || 0),
          apply_starts: Number(b.apply_starts || 0) - Number(a.apply_starts || 0),
          applies: Number(b.applies || 0) - Number(a.applies || 0)
        });
      }
      renderTable('比較期間', rows);
    }

    function renderTable(labelName, rows) {
      lastCopyRows = rows.map(row => ({ label: row.label, ...row, ...calcRates(row) }));
      els.copyBtn.disabled = rows.length === 0;
      if (!rows.length) { els.comparisonContent.innerHTML = '<div class="empty">該当データがありません。</div>'; return; }
      els.comparisonContent.innerHTML = `<div class="table-wrap"><table><thead><tr><th>${esc(labelName)}</th>${metricHeaders()}</tr></thead><tbody>${rows.map(row => `<tr><td>${esc(row.label)}</td>${metricCells(row)}</tr>`).join('')}</tbody></table></div>`;
    }

    function copyTable() {
      if (!lastCopyRows.length) return;
      const headers = ['ラベル','該当件数','消化金額','表示回数','クリック数','応募開始数','応募数','CVR','CPA'];
      const lines = [headers.join('\t')];
      lastCopyRows.forEach(row => lines.push([row.label,row.count,row.cost,row.impressions,row.clicks,row.apply_starts,row.applies,row.cvr ?? '',row.cpa ?? ''].join('\t')));
      navigator.clipboard.writeText(lines.join('\n')).catch(() => {});
    }

    els.folderInput.addEventListener('change', e => handleFiles(e.target.files).catch(err => { console.error(err); log('[ERROR]\n' + (err.stack || err.message)); setStatus('エラー','bad'); }));
    els.refreshBtn.addEventListener('click', () => { clearLog(); refreshAll(); });
    els.copyBtn.addEventListener('click', copyTable);
    els.clearSelectedBtn.addEventListener('click', () => { selectedJobTitles = []; renderSelectedJobs(); refreshAll(); });
    [els.freeWordInput, els.locationInput].forEach(input => input.addEventListener('keydown', e => { if (e.key === 'Enter') { clearLog(); refreshAll(); } }));
    [els.searchMode, els.campaignFilter, els.periodFrom, els.periodTo, els.compareAFrom, els.compareATo, els.compareBFrom, els.compareBTo].forEach(el => el.addEventListener('change', () => { clearLog(); refreshAll(); }));
    document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); comparisonMode = tab.dataset.mode; updateComparisonControls(); clearLog(); refreshAll(); }));
  </script>
</body>
</html>
